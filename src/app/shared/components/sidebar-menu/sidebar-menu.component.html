<div class="sidebar-backdrop" [class.show]="isOpen" (click)="close()"></div>

<aside class="sidebar-drawer" [class.open]="isOpen" [class.dark-theme]="darkMode">
  <!-- Sidebar Header -->
  <div class="sidebar-top">
    <div class="sidebar-header">
      <div class="brand-row">
        <div class="brand-logo">
          <i class="bi bi-grid-fill"></i>
        </div>
        <div class="brand-text">
          <div class="brand-name">My Application</div>
          <div class="brand-sub">Classic modern menu</div>
        </div>

        <button type="button" class="btn-close-drawer ms-auto"
          (click)="close()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <div class="profile-row">
        <div class="profile-avatar">
          <i class="bi bi-person-fill"></i>
        </div>

        <div class="profile-info">
          <div class="profile-name">ข้อมูลที่อยู่ 000-00</div>
          <div class="profile-desc">User Profile</div>
        </div>
      </div>

      <div class="theme-row">
        <div class="theme-left">
          <div class="theme-icon">
            <i class="bi bi-moon-stars-fill"></i>
          </div>
          <div>
            <div class="theme-title">โหมดกลางคืน</div>
            <div class="theme-subtitle">ปรับมุมมองสบายตา</div>
          </div>
        </div>

        <div class="form-check form-switch m-0">
          <input
            class="form-check-input"
            type="checkbox"
            [checked]="isDark()"
            (change)="toggleDarkMode()" />
        </div>
      </div>
    </div>
  </div>

  <!-- bottom (logout) -->
  <div class="sidebar-bottom">
    <div class="sidebar-footer">
      <button type="button" class="logout-btn">
        <i class="bi bi-box-arrow-right"></i>
        <span>ออกจากระบบ</span>
      </button>
    </div>
  </div>
</aside>
