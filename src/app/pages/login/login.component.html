<div class="page">

  <!-- background -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card">

    <div class="card-bar"></div>

    <div class="card-body">

      <!-- Brand -->
      <div class="brand">
        <div class="logo-wrap">
          <svg viewBox="0 0 120 60" class="logo-svg">
            <rect x="4" y="4" width="8" height="36" rx="1" fill="#ff00cc"/>
            <path d="M4 4 h18 a10 10 0 0 1 0 20 H12" stroke="#ff00cc" stroke-width="8" fill="none"/>
            <rect x="30" y="8" width="24" height="32" rx="4" fill="#ff44dd" opacity="0.25"/>
            <text x="38" y="35" font-size="26" font-weight="900" fill="#ff00cc">1</text>
            <rect x="62" y="4" width="8" height="36" rx="1" fill="#ff00cc"/>
          </svg>
        </div>

        <div class="brand-text">
          <h1 class="project-name">{{ projectName }}</h1>
          <p class="company-name">{{ companyName }}</p>
        </div>
      </div>

      <!-- Divider -->
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-label">เข้าสู่ระบบ</span>
        <span class="divider-line"></span>
      </div>

      <!-- Instructions -->
      <div class="instructions">
        <div class="instruction-step">
          <span class="step-num">1</span>
          <span>กรอก Username</span>
        </div>
        <div class="instruction-step">
          <span class="step-num">2</span>
          <span>กรอก Password</span>
        </div>
        <div class="instruction-step">
          <span class="step-num">3</span>
          <span>กดปุ่ม <strong>เข้าสู่ระบบ</strong></span>
        </div>
      </div>

      <!-- FORM -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

        <!-- USERNAME -->
        <div class="field"
             [class.field--error]="showUsernameError"
             [class.field--valid]="usernameCtrl.valid && usernameCtrl.dirty">

          <label class="field-label">Username</label>

          <div class="input-wrap">
            <input
              type="text"
              class="input"
              placeholder="Username"
              formControlName="username"
            />
          </div>

          <p class="error-msg" *ngIf="showUsernameError">
            {{ getUsernameError() }}
          </p>
        </div>

        <!-- PASSWORD -->
        <div class="field"
             [class.field--error]="showPasswordError"
             [class.field--valid]="passwordCtrl.valid && passwordCtrl.dirty">

          <label class="field-label">Password</label>

          <div class="input-wrap">
            <input
              type="password"
              class="input"
              placeholder="Password"
              formControlName="password"
            />
          </div>

          <p class="error-msg" *ngIf="showPasswordError">
            {{ getPasswordError() }}
          </p>
        </div>

        <!-- ERROR -->
        <div class="alert-error" *ngIf="loginError()">
          {{ loginError() }}
        </div>

        <!-- BUTTON -->
        <button type="submit"
                class="btn-login"
                [disabled]="isLoading()">

          <ng-container *ngIf="isLoading(); else loginText">
            <span class="spinner"></span>
            <span>กำลังเข้าสู่ระบบ...</span>
          </ng-container>

          <ng-template #loginText>
            <span>เข้าสู่ระบบ</span>
          </ng-template>
        </button>

      </form>

    </div>

    <!-- Footer -->
    <div class="card-footer">
      <span>
        บริหารจัดการโดย <strong>{{ adminName }}</strong> {{ adminPhone }}
      </span>
    </div>

  </div>
</div>
