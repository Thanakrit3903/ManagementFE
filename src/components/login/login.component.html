<div class="page">

  <!-- Animated background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Card -->
  <div class="card">

    <!-- Top accent bar -->
    <div class="card-bar"></div>

    <div class="card-body">

      <!-- Logo area -->
      <div class="brand">
        <div class="logo-wrap">
          <!-- SVG Logo: P1K -->
          <svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
            <!-- P -->
            <rect x="4" y="4" width="8" height="36" rx="1" fill="#ff00cc"/>
            <path d="M4 4 h18 a10 10 0 0 1 0 20 H12" stroke="#ff00cc" stroke-width="8" fill="none" stroke-linecap="round"/>
            <!-- Pink square background for 1 -->
            <rect x="30" y="8" width="24" height="32" rx="4" fill="#ff44dd" opacity="0.25"/>
            <!-- 1 -->
            <text x="38" y="35" font-size="26" font-weight="900" fill="#ff00cc" font-family="'Arial Black',sans-serif">1</text>
            <!-- K -->
            <rect x="62" y="4" width="8" height="36" rx="1" fill="#ff00cc"/>
            <line x1="70" y1="22" x2="90" y2="4" stroke="#ff00cc" stroke-width="8" stroke-linecap="round"/>
            <line x1="70" y1="22" x2="90" y2="40" stroke="#ff00cc" stroke-width="8" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1 class="project-name">{{ projectName }}</h1>
          <p class="company-name">{{ companyName }}</p>
        </div>
      </div>

      <!-- Divider -->
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-label">เข้าสู่ระบบ</span>
        <span class="divider-line"></span>
      </div>

      <!-- Instructions -->
      <div class="instructions">
        <div class="instruction-step">
          <span class="step-num">1</span>
          <span>ใส่รหัสห้องชุดในรูปแบบ <strong class="code-example">บ้านเลขที่-ห้อง</strong></span>
        </div>
        <div class="instruction-step">
          <span class="step-num">2</span>
          <span>โปรดใส่รหัสห้องชุด เช่น <strong class="code-example">101-03</strong></span>
        </div>
        <div class="instruction-step">
          <span class="step-num">3</span>
          <span>กดปุ่ม <strong>เข้าสู่ระบบ</strong></span>
        </div>
      </div>

      <!-- Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="field" [class.field--error]="showError" [class.field--valid]="tenantCodeCtrl.valid && tenantCodeCtrl.dirty">

          <label class="field-label" for="tenantCode">รหัสลูกบ้าน</label>

          <div class="input-wrap">
            <!-- Icon -->
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>

            <input
              id="tenantCode"
              type="text"
              class="input"
              placeholder="000-00"
              formControlName="tenantCode"
              autocomplete="off"
              inputmode="text"
            />

            <!-- Valid checkmark -->
            <svg *ngIf="tenantCodeCtrl.valid && tenantCodeCtrl.dirty" class="input-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M20 6L9 17l-5-5"/>
            </svg>
          </div>

          <p class="error-msg" *ngIf="showError">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            {{ getErrorMessage() }}
          </p>
        </div>

        <div class="alert-error" *ngIf="loginError()">{{ loginError() }}</div>

        <button type="submit" class="btn-login" [class.btn-login--loading]="isLoading()" [disabled]="isLoading()">
          <ng-container *ngIf="isLoading(); else loginText">
            <span class="spinner"></span>
            <span>กำลังเข้าสู่ระบบ...</span>
          </ng-container>
          <ng-template #loginText>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            <span>เข้าสู่ระบบ</span>
          </ng-template>
        </button>
      </form>

    </div>

    <!-- Footer -->
    <div class="card-footer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 11 19.79 19.79 0 0 1 1.61 2.34 2 2 0 0 1 3.6.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 7.91a16 16 0 0 0 6.08 6.08l.99-.99a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 15.2v1.72z"/></svg>
      <span>บริหารจัดการโดย <strong>{{ adminName }}</strong> {{ adminPhone }}</span>
    </div>

  </div>
</div>
